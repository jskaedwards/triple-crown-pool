    function initFirebase() {

      setTimeout(() => {
        if (state.loading) {
          state.loading = false;
          state.firebaseError = true;
          render();
        }
      }, 8000);

        state.configMissing = true;
        state.loading = false;
        render();
        return;

      // Listen to all participants

        state.participants = { derby:{}, preakness:{}, belmont:{} };
        if (snap.exists()) {
          snap.forEach(raceSnap => {
            const raceId = raceSnap.key;
            state.participants[raceId] = {};
            raceSnap.forEach(entrySnap => {
              state.participants[raceId][entrySnap.key] = entrySnap.val();
            });
          });
        }
        state.loading = false;
        render();
      });

      // Listen to results
      onValue(ref(db, "results"), snap => {
        state.results = { derby:{first:null,second:null,third:null}, preakness:{first:null,second:null,third:null}, belmont:{first:null,second:null,third:null} };
        if (snap.exists()) Object.assign(state.results, snap.val());
        render();
      });

    // ── Score calculation ───────────────────────────────────────────────────
    function calcScore(raceId, entry) {
      const r = state.results[raceId];
      if (!r || r.first == null) return 0;
      let score = 0;
      const {first,second,third} = r;
      const p1=entry.pick1, p2=entry.pick2, p3=entry.pick3;
      if (p1===first)  score += SCORING.win.pts;
      if (p1===first||p1===second) score += SCORING.place.pts;
      if ([p1,p2,p3].some(p=>p===first||p===second||p===third)) score += SCORING.show.pts;
      if (p1===first&&p2===second) score += SCORING.exacta.pts;
      if (p1===first&&p2===second&&p3===third) score += SCORING.trifecta.pts;
      return score;
    }

    function getOverallLeaderboard() {
      const names = new Set();
      Object.values(state.participants).forEach(raceMap =>
        Object.values(raceMap).forEach(e => names.add(e.name))
      );
      return Array.from(names).map(name => {
        const breakdown = {};
        let total = 0;
        ["derby","preakness","belmont"].forEach(rid => {
          const pts = Object.values(state.participants[rid]||{})
            .filter(e=>e.name===name)
            .reduce((s,e)=>s+calcScore(rid,e),0);
          breakdown[rid] = pts;
          total += pts;
        });
        return { name, breakdown, total };
      }).sort((a,b)=>b.total-a.total);
    }

    function fieldOpen(raceId) {
      const h=RACES[raceId]?.horses||[];
      return h.length>1||!h[0]?.name?.startsWith("Entries");

            <div style="text-align:right">
              <div style="font-size:13px;color:#c4982a;font-weight:700">${race.date}</div>
              <div style="font-size:11px;color:#6a5030">${race.venue}</div>
              <div style="font-size:11px;color:#6a5030">${race.distance} · ${race.postTime}</div>
            </div>
          </div>
        </div>
        <div class="score-chips">${scoringChips}</div>
        ${form}
      `;
    }

    // FIELD
    function buildField(race) {
      const open = fieldOpen(race.id);
      const horseCards = open ? race.horses.map(h=>`
        <div class="horse-card" style="border-left:3px solid ${h.color}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <span class="hc-name">${h.post!=="-"?h.post+". ":""}${h.name}</span>
            ${h.odds?`<span class="hc-odds">${h.odds}</span>`:""}
          </div>
          <div class="hc-meta">${[h.jockey&&"Jockey: "+h.jockey, h.trainer&&"Trainer: "+h.trainer].filter(Boolean).join(" · ")}</div>
          ${h.note?`<div class="hc-note">${h.note}</div>`:""}
        </div>
      `).join("") : `<div class="alert alert-info">⏳ ${race.horses[0].name}. ${race.horses[0].note||""}</div>`;

      return `
        <div style="margin-bottom:16px">
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#d4a82a">${race.emoji} ${race.name} Field</div>
          <div style="font-size:13px;color:#7a5c18;font-style:italic">${race.venue} · ${race.date} · ${race.distance}</div>
        </div>
        <div class="horse-grid">${horseCards}</div>
        <div class="disclaimer">⚠️ Update horse data after each official post draw. See README for instructions.</div>
      `;
    }

    // PICKS
    function buildPicks(race) {
      const entries = Object.entries(state.participants[race.id]||{});
      const hr = hasResults(race.id);
      const rows = entries.length===0
        ? `<div class="empty">No entries yet — be the first! 🌹</div>`
        : entries.map(([fbKey,entry],i) => {
            const score = calcScore(race.id, entry);
            const picks = [
              {label:"🥇 WIN",   id:entry.pick1},
              {label:"🥈 PLACE", id:entry.pick2},
              {label:"🥉 SHOW",  id:entry.pick3},
            ].map(p=>`
              <div class="pick-badge" style="border-left:2px solid ${horseColor(race.id,p.id)}">
                <div class="pb-label">${p.label}</div>
                <div class="pb-horse">${horseName(race.id,p.id)}</div>
              </div>
            `).join("");
            return `
              <div class="entry-row fade-in">
                <div class="entry-num">${i+1}</div>
                <div style="flex:2;min-width:100px">
                  <div class="entry-name">${entry.name}</div>
                  <div style="font-size:10px;color:#5a4020;font-style:italic">${entry.enteredAt||""}</div>
                </div>
                <div class="pick-badges">${picks}</div>
                ${hr?`<div class="score-badge ${score>0?"nonzero":""}">
                  <div class="sb-label">SCORE</div>
                  <div class="sb-val">${score}</div>
                </div>`:""}
              </div>
            `;
          }).join("");

      return `
        <div class="flex-between" style="margin-bottom:16px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#d4a82a">${race.emoji} ${race.name} Entries</div>
            <div style="font-size:13px;color:#7a5c18;font-style:italic">${entries.length} ${entries.length===1?"entry":"entries"} — live via Firebase 🔴</div>
          </div>
          <button class="btn btn-outline" data-action="openAdmin">⚙ Admin</button>
        </div>
        ${rows}
      `;
    }

    // BOARD
    function buildBoard(race) {
      const entries = Object.entries(state.participants[race.id]||{});
      const hr = hasResults(race.id);
      const r = state.results[race.id];

      const sorted = [...entries]
        .map(([k,e])=>({...e, fbKey:k, score:calcScore(race.id,e)}))
        .sort((a,b)=>b.score-a.score);

      const rows = sorted.length===0
        ? `<div class="empty">No entries yet for this race.</div>`
        : sorted.map((entry,i)=>`
            <div class="lb-row ${i===0?"gold":""}">
              <div class="lb-medal">${medal(i)}</div>
              <div style="flex:1">
                <div class="lb-name ${i===0?"gold":""}">${entry.name}</div>
                <div class="lb-breakdown">
                  Win: ${horseName(race.id,entry.pick1)} · Place: ${horseName(race.id,entry.pick2)} · Show: ${horseName(race.id,entry.pick3)}
                </div>
              </div>
              <div class="lb-total">${entry.score}</div>
            </div>
          `).join("");

      const pendingCard = !hr ? `
        <div class="card" style="text-align:center;padding:32px;margin-bottom:16px">
          <div style="font-size:36px;margin-bottom:10px">🏁</div>
          <div style="font-size:16px;color:#8a7050;font-style:italic">Race results pending — ${race.date} at ${race.postTime}</div>
          <div style="font-size:12px;color:#5a4030;margin-top:6px">Admin enters finishing order after the race — scores update live for everyone</div>
          <button class="btn btn-outline" style="margin-top:14px;color:#d4a82a;border-color:#5a3a00" data-action="openAdmin">Enter Results</button>
        </div>
      ` : `<div class="alert alert-success" style="margin-bottom:16px">
        🏁 Official results: 🥇 ${horseName(race.id,r.first)} · 🥈 ${horseName(race.id,r.second)} · 🥉 ${horseName(race.id,r.third)}
      </div>`;

      return `
        <div class="flex-between" style="margin-bottom:16px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#d4a82a">${race.emoji} ${race.name} Leaderboard</div>
            <div style="font-size:13px;color:#7a5c18;font-style:italic">Scores update live for all users 🔴</div>
          </div>
          <button class="btn btn-outline" data-action="openAdmin">⚙ Results</button>
        </div>
        ${pendingCard}
        ${rows}
      `;
    }

    // OVERALL
    function buildOverall() {
      const board = getOverallLeaderboard();
      const summaries = Object.values(RACES).map(race => {
        const r = state.results[race.id];
        const hr = hasResults(race.id);
        return `
          <div class="race-summary">
            <div class="rs-title">${race.emoji} ${race.name}</div>
            <div class="rs-date">${race.date}</div>
            <div class="rs-status ${hr?"rs-winner":"rs-pending"}">
              ${hr ? `🥇 ${horseName(race.id,r.first)}` : "⏳ Pending"}
            </div>
          </div>
        `;
      }).join("");

      const rows = board.length===0
        ? `<div class="empty">No entries yet. Enter picks for any race to appear here.</div>`
        : board.map((p,i)=>`
            <div class="lb-row ${i===0?"gold":""}">
              <div class="lb-medal">${medal(i)}</div>
              <div style="flex:1">
                <div class="lb-name ${i===0?"gold":""}">${p.name}</div>
                <div class="lb-breakdown">
                  ${Object.entries(p.breakdown).map(([rid,pts])=>
                    `${RACES[rid].emoji} ${RACES[rid].name.split(" ")[0]}: ${pts}pts`
                  ).join(" · ")}
                </div>
              </div>
              <div class="lb-total">${p.total}</div>
            </div>
          `).join("");

      return `
        <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#d4a82a;margin-bottom:4px">🏆 Triple Crown Overall Champion</div>
        <div style="font-size:13px;color:#7a5c18;font-style:italic;margin-bottom:20px">Combined scores across all three races — live for everyone 🔴</div>
        <div class="race-summary-grid">${summaries}</div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#d4a82a;margin:16px 0 12px">Overall Standings</div>
        ${rows}
      `;
    }


    // ── ADMIN TAB ────────────────────────────────────────────────────────────
    function buildAdminTab(race) {
      const wrap = document.createElement('div');

      // Not logged in — show login form
      if (!state.adminAuthed) {
        return `
          <div style="max-width:360px;margin:40px auto;">
            <div class="card" style="text-align:center">
              <div style="font-size:48px;margin-bottom:12px">🔐</div>
              <div class="card-title" style="text-align:center">Admin Login</div>
              <div style="font-size:13px;color:#7a5c18;font-style:italic;margin-bottom:16px">
                Enter the admin password to manage results and entries
              </div>
              <div id="admin-tab-error"></div>
              <label class="field-label">PASSWORD</label>
              <input type="password" id="admin-tab-pw" placeholder="Enter admin password"
                style="text-align:center;font-size:18px;letter-spacing:4px" />
              <button class="btn btn-gold" style="margin-top:14px" data-action="adminTabLogin">
                🔓 UNLOCK ADMIN
              </button>
            </div>
          </div>
        `;
      }

      // Logged in — show full admin panel
      const raceSelects = Object.values(RACES).map(race => {
        const r = state.results[race.id] || {};
        const opts = race.horses.filter(h => !h.name.startsWith("Entries")).map(h =>
          `<option value="${h.id}">${h.name}</option>`
        ).join("");
        return `
          <div style="margin-bottom:18px;padding:14px;background:#140f00;border:1px solid #2e2000;border-radius:10px">
            <div style="font-size:14px;font-weight:700;color:${race.color};margin-bottom:10px;font-family:'Playfair Display',serif">
              ${race.emoji} ${race.name} — ${race.date}
            </div>
            <label class="field-label">🥇 1ST PLACE</label>
            <select id="res-${race.id}-first">
              <option value="">— Select —</option>${opts}
            </select>
            <label class="field-label">🥈 2ND PLACE</label>
            <select id="res-${race.id}-second">
              <option value="">— Select —</option>${opts}
            </select>
            <label class="field-label">🥉 3RD PLACE</label>
            <select id="res-${race.id}-third">
              <option value="">— Select —</option>${opts}
            </select>
            <button class="btn btn-gold" style="margin-top:12px"
              data-action="saveResults" data-race="${race.id}">
              ✅ Save ${race.name} Results
            </button>
          </div>
        `;
      }).join("");

      return `
        <div>
          <div class="flex-between" style="margin-bottom:16px">
            <div>
              <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#d4a82a">⚙ Admin Panel</div>
              <div style="font-size:13px;color:#7a5c18;font-style:italic">Enter race results — scores update live for everyone</div>
            </div>
            <button class="btn btn-outline" data-action="adminTabLogout" style="color:#ff6060;border-color:#6a1000">
              🔒 Logout
            </button>
          </div>

          <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#d4a82a;margin-bottom:12px">
            🏁 Enter Race Results
          </div>
          ${raceSelects}

          <hr class="divider"/>
          <div style="font-size:13px;color:#8a2020;font-weight:700;margin-bottom:8px">⚠️ Danger Zone</div>
          <button class="btn btn-danger" data-action="clearRace">
            🗑 Clear ${RACES[state.currentRace].name} Entries
          </button>
          <button class="btn btn-danger" style="margin-top:6px" data-action="clearAll">
            🗑 Clear Everything (All 3 Races)
          </button>
        </div>
      `;
    }
    // ADMIN MODAL
    function buildAdminModal() {
      const inner = !state.adminAuthed ? `
        <div style="font-size:12px;color:#7a5c18;letter-spacing:1px;margin-bottom:6px">PASSWORD</div>
        <input type="password" id="admin-pw" placeholder="Admin password" />
        <div style="font-size:11px;color:#4a3020;font-style:italic;margin:6px 0 12px">Default: roses2026</div>
        <button class="btn btn-gold" data-action="adminLogin">Unlock</button>
      ` : buildAdminAuthed();

      return `
        <div class="modal-backdrop" data-action="closeAdmin">
          <div class="modal" id="modal-box">
            <div class="modal-title">⚙ Admin Panel</div>
            ${inner}
          </div>
        </div>
      `;
    }

    function buildAdminAuthed() {
      const raceSelects = Object.values(RACES).map(race => {
        const r = state.results[race.id]||{};
        const opts = race.horses.filter(h=>!h.name.startsWith("Entries")).map(h=>
          `<option value="${h.id}">${h.name}</option>`
        ).join("");
        const makeSelect = (key, label) => `
          <label class="field-label" style="margin-top:8px">${label}</label>
          <select id="res-${race.id}-${key}">
            <option value="">— Select —</option>${opts}
          </select>
        `;
        return `
          <div style="margin-bottom:16px">
            <div style="font-size:14px;font-weight:700;color:${race.color};margin-bottom:6px">${race.emoji} ${race.name}</div>
            ${makeSelect("first","🥇 1st Place")}
            ${makeSelect("second","🥈 2nd Place")}
            ${makeSelect("third","🥉 3rd Place")}
            <button class="btn btn-outline" style="margin-top:10px;width:100%;color:#d4a82a;border-color:#5a3a00"
              data-action="saveResults" data-race="${race.id}">Save ${race.name} Results</button>
          </div>
          <hr class="divider" />
        `;
      }).join("");

      return `
        ${raceSelects}
        <div style="font-size:13px;color:#8a2020;font-weight:700;margin-bottom:8px">Danger Zone</div>
        <button class="btn btn-danger" data-action="clearRace">🗑 Clear ${RACES[state.currentRace].name} Entries</button>
        <button class="btn btn-danger" style="margin-top:6px" data-action="clearAll">🗑 Clear Everything (All 3 Races)</button>
        <button class="btn btn-outline" style="margin-top:14px;width:100%" data-action="closeAdmin">Close</button>
      `;
    }

    // ── Event handling ──────────────────────────────────────────────────────
    function attachEvents() {
      document.getElementById("app").addEventListener("click", handleClick);
      // Restore admin select values after re-render
      if ((state.adminAuthed && state.adminOpen) || (state.adminAuthed && state.currentTab==="admin")) {
        Object.values(RACES).forEach(race => {
          const r = state.results[race.id]||{};
          ["first","second","third"].forEach(k => {
            const el = document.getElementById(`res-${race.id}-${k}`);
            if (el && r[k]!=null) el.value = String(r[k]);
          });
        });
      }
      // Stop modal close on inner click
      const modal = document.getElementById("modal-box");
      if (modal) modal.addEventListener("click", e => e.stopPropagation());
    }

    function handleClick(e) {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;

      if (action==="switchRace") {
        state.currentRace = btn.dataset.race;
        state.currentTab = "enter";
        state.flash = null;
        render();
      }
      else if (action==="switchTab") {
        state.currentTab = btn.dataset.tab;
        state.flash = null;
        render();
      }
      else if (action==="openAdmin") {
        state.adminOpen = true; render();
      }
      else if (action==="closeAdmin") {
        state.adminOpen = false; state.adminAuthed = false; render();
      }
      else if (action==="adminLogin") {
        state.adminAuthed = true; render();
      }
      else if (action==="submitPick") handleSubmit();
      else if (action==="adminTabLogin") handleAdminTabLogin();
      else if (action==="adminTabLogout") { state.adminAuthed=false; render(); }
      else if (action==="saveResults") handleSaveResults(btn.dataset.race);
      else if (action==="clearRace") handleClearRace();
      else if (action==="clearAll") handleClearAll();
    }

    function handleAdminTabLogin() {
      const pw = document.getElementById("admin-tab-pw");
      const errEl = document.getElementById("admin-tab-error");
      if (pw && pw.value === ADMIN_PASSWORD) {
        state.adminAuthed = true;
        render();
        // Restore result selects
        setTimeout(() => {
          Object.values(RACES).forEach(race => {
            const r = state.results[race.id]||{};
            ["first","second","third"].forEach(k => {
              const el = document.getElementById("res-"+race.id+"-"+k);
              if (el && r[k]!=null) el.value = String(r[k]);
            });
          });
        }, 50);
      } else {
        if (errEl) errEl.innerHTML = `<div class="alert alert-error">⚠️ Wrong password. Try: brindley</div>`;
        if (pw) { pw.value=""; pw.focus(); }
      }
    }

    async function handleSubmit() {
      const name  = document.getElementById("f-name")?.value?.trim();
      const p1    = document.getElementById("f-pick1")?.value;
      const p2    = document.getElementById("f-pick2")?.value;
      const p3    = document.getElementById("f-pick3")?.value;
      const errEl = document.getElementById("form-error");

      const err = (msg) => { if(errEl) errEl.innerHTML=`<div class="alert alert-error">${msg}</div>`; };

      if (!name)   return err("⚠️ Please enter your name.");
      if (!p1)     return err("⚠️ Please select your WIN pick.");
      if (!p2)     return err("⚠️ Please select your PLACE pick.");
      if (!p3)     return err("⚠️ Please select your SHOW pick.");
      if (p1===p2||p1===p3||p2===p3) return err("⚠️ Each pick must be a different horse.");

      // Check for duplicate name in this race
      const existing = Object.values(state.participants[state.currentRace]||{})
        .find(e=>e.name.toLowerCase()===name.toLowerCase());
      if (existing) return err(`⚠️ "${name}" already has an entry for this race.`);

      const entry = {
        name,
        pick1: parseInt(p1), pick2: parseInt(p2), pick3: parseInt(p3),
        enteredAt: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})
      };

      try {
        await push(ref(db, `participants/${state.currentRace}`), entry);
        state.flash = { msg:`🌹 ${name} is in the ${RACES[state.currentRace].name} pool! Good luck on ${RACES[state.currentRace].date}!`, type:"success" };
        state.currentTab = "picks";
        render();
      } catch(e) {
        err("⚠️ Could not save your pick. Check your Firebase config and database rules.");
      }
    }

    async function handleSaveResults(raceId) {
      const first  = document.getElementById(`res-${raceId}-first`)?.value;
      const second = document.getElementById(`res-${raceId}-second`)?.value;
      const third  = document.getElementById(`res-${raceId}-third`)?.value;
      try {
        await set(ref(db, `results/${raceId}`), {
          first:  first  ? parseInt(first)  : null,
          second: second ? parseInt(second) : null,
          third:  third  ? parseInt(third)  : null,
        });
        state.flash = { msg:`✅ ${RACES[raceId].name} results saved! Scores updated for everyone.`, type:"success" };
        state.adminOpen = false; state.adminAuthed = false;
        state.currentTab = "board";
        render();
      } catch(e) {
        alert("Could not save results. Check your Firebase permissions.");
      }
    }

    async function handleClearRace() {
      if (!confirm(`Clear ALL entries for the ${RACES[state.currentRace].name}? This cannot be undone.`)) return;
      try {
        await remove(ref(db, `participants/${state.currentRace}`));
        await set(ref(db, `results/${state.currentRace}`), {first:null,second:null,third:null});
        state.flash = { msg:`🗑 ${RACES[state.currentRace].name} entries cleared.`, type:"info" };
        state.adminOpen = false; state.adminAuthed = false;
        render();
      } catch(e) { alert("Could not clear data."); }
    }

    async function handleClearAll() {
      if (!confirm("Clear ALL entries and results for all 3 races? This cannot be undone.")) return;
      try {
        await remove(ref(db, "participants"));
        await remove(ref(db, "results"));
        state.flash = { msg:"🗑 All data cleared.", type:"info" };
        state.adminOpen = false; state.adminAuthed = false;
        render();
      } catch(e) { alert("Could not clear data."); }
    }

    // ── Boot ────────────────────────────────────────────────────────────────
    initFirebase();

  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#0a0700; color:#f0e2c0; font-family:'Crimson Pro',Georgia,serif; min-height:100vh; }
    #app { min-height:100vh; }
    a { color:#d4a82a; }

    /* Header */
    .header { background:linear-gradient(180deg,#1c1000,#140c00); border-bottom:2px solid #7a5c18; position:sticky; top:0; z-index:100; }
    .header-inner { max-width:960px; margin:0 auto; padding:14px 20px 0; }
    .header-title { font-family:'Playfair Display',serif; font-size:clamp(18px,5vw,30px); font-weight:900; letter-spacing:3px; color:#d4a82a; text-align:center; line-height:1; }
    .header-sub { font-size:11px; color:#7a5c18; letter-spacing:2px; text-align:center; font-style:italic; padding:3px 0 8px; }
    .race-tabs { display:flex; justify-content:center; flex-wrap:wrap; border-top:1px solid #2a1e00; }
    .race-tab { padding:8px 13px; background:transparent; border:none; border-bottom:3px solid transparent; color:#6a5030; cursor:pointer; font-size:12px; font-family:'Playfair Display',serif; letter-spacing:1px; transition:all 0.2s; white-space:nowrap; display:flex; flex-direction:column; align-items:center; }
    .race-tab.active { color:#d4a82a; border-bottom-color:#d4a82a; }
    .tab-date { font-size:9px; color:#5a4020; margin-top:1px; font-family:'Crimson Pro',serif; }
    .race-tab.active .tab-date { color:#9a7a30; }
    .nav-tabs { display:flex; justify-content:center; background:#120e00; border-bottom:1px solid #1e1600; flex-wrap:wrap; }
    .nav-tab { padding:8px 16px; background:transparent; border:none; border-bottom:2px solid transparent; color:#5a4020; cursor:pointer; font-size:12px; font-family:'Playfair Display',serif; letter-spacing:1px; transition:all 0.2s; }
    .nav-tab.active { color:#c4982a; border-bottom-color:#c4982a; }

    /* Layout */
    .container { max-width:960px; margin:0 auto; padding:24px 16px 80px; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .divider { border:none; border-top:1px solid #2a1a00; margin:14px 0; }

    /* Cards */
    .card { background:linear-gradient(135deg,#1a1200,#201600); border:1px solid #2e2000; border-radius:14px; padding:20px; margin-bottom:16px; }
    .card-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#d4a82a; margin-bottom:14px; letter-spacing:1px; }

    /* Forms */
    .field-label { display:block; font-size:11px; color:#7a5c18; letter-spacing:2px; margin-bottom:5px; margin-top:12px; }
    input, select, textarea { width:100%; padding:10px 14px; background:#0a0700; border:1px solid #2e2000; border-radius:8px; color:#f0e2c0; font-size:14px; font-family:'Crimson Pro',serif; outline:none; transition:border-color 0.2s; }
    input:focus, select:focus { border-color:#7a5c18; }
    select option { background:#1a1200; }

    /* Buttons */
    .btn { display:inline-block; padding:11px 20px; border-radius:9px; border:none; cursor:pointer; font-family:'Playfair Display',serif; font-size:14px; font-weight:700; letter-spacing:1px; transition:opacity 0.2s,transform 0.1s; }
    .btn:active { transform:scale(0.97); }
    .btn-gold { background:linear-gradient(135deg,#8a5a00,#c4820a); border:2px solid #d4a82a; color:#fff; width:100%; font-size:15px; margin-top:10px; }
    .btn-outline { background:#1a1200; border:1px solid #3a2a00; color:#9a7a30; }
    .btn-danger { background:#2a0000; border:1px solid #6a1000; color:#ff6060; width:100%; margin-top:8px; }

    /* Score chips */
    .score-chips { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:20px; }
    .score-chip { background:linear-gradient(135deg,#1a1200,#251900); border:1px solid #2e2000; border-radius:10px; padding:10px; text-align:center; }

    .sc-label { font-size:10px; font-weight:700; color:#d4a82a; letter-spacing:1px; margin-top:3px; }
    .sc-desc { font-size:10px; color:#6a5030; font-style:italic; }
    .sc-pts { font-size:14px; color:#7dea40; font-weight:700; margin-top:2px; }

    /* Horse grid */
    .horse-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px; margin-bottom:14px; }
    .horse-card { background:#140f00; border-radius:10px; border:1px solid #2a1a00; padding:10px 12px; }
    .hc-name { font-size:14px; font-weight:700; color:#f0e2c0; }
    .hc-meta { font-size:11px; color:#6a5030; margin-top:2px; }
    .hc-note { font-size:11px; color:#5a7040; font-style:italic; margin-top:4px; }
    .hc-odds { background:#0a0700; border:1px solid #2a1a00; border-radius:5px; padding:2px 7px; font-size:11px; color:#d4a82a; font-family:monospace; }

    /* Entries */
    .entry-row { display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,#1a1200,#201600); border:1px solid #2a1a00; border-radius:12px; padding:12px 16px; margin-bottom:8px; flex-wrap:wrap; }
    .entry-num { width:26px; height:26px; border-radius:50%; background:#2a1a00; border:1px solid #4a3000; display:flex; align-items:center; justify-content:center; font-size:11px; color:#d4a82a; font-weight:700; flex-shrink:0; }
    .entry-name { font-size:16px; font-weight:700; }
    .pick-badges { display:flex; gap:6px; flex:3; flex-wrap:wrap; }
    .pick-badge { background:#0a0700; border-radius:6px; padding:3px 8px; min-width:80px; }
    .pb-label { font-size:9px; color:#5a4020; letter-spacing:1px; }
    .pb-horse { font-size:12px; font-weight:700; color:#f0e2c0; }
    .score-badge { background:#0a1800; border:1px solid #2a4000; border-radius:8px; padding:5px 12px; text-align:center; min-width:60px; }
    .score-badge.nonzero { background:#0d2200; border-color:#4a8a00; }
    .sb-label { font-size:9px; color:#5a7030; letter-spacing:1px; }
    .sb-val { font-size:22px; font-weight:900; color:#4a5a30; }
    .score-badge.nonzero .sb-val { color:#7dea40; }

    /* Leaderboard */
    .lb-row { display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,#1a1200,#201600); border:1px solid #2a1a00; border-radius:12px; padding:12px 18px; margin-bottom:8px; }
    .lb-row.gold { background:linear-gradient(135deg,#1a1500,#2e2400); border-color:#6a5010; }
    .lb-medal { font-size:22px; width:30px; text-align:center; flex-shrink:0; }
    .lb-name { font-size:17px; font-weight:700; }
    .lb-name.gold { color:#d4a82a; }
    .lb-breakdown { font-size:10px; color:#5a4020; font-style:italic; }
    .lb-total { font-size:28px; font-weight:900; color:#d4a82a; }

    /* Overall */
    .race-summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:20px; }
    .race-summary { background:#140f00; border:1px solid #2a1a00; border-radius:10px; padding:12px 14px; }
    .rs-title { font-size:13px; font-weight:700; color:#d4a82a; }
    .rs-date { font-size:10px; color:#5a4020; font-style:italic; }
    .rs-status { font-size:12px; margin-top:6px; }
    .rs-winner { color:#7dea40; }
    .rs-pending { color:#7a5c18; font-style:italic; }

    /* Alerts */
    .alert { border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:14px; }
    .alert-success { background:#0d2200; border:1px solid #4a8a00; color:#7dea40; }
    .alert-error { background:#2a0000; border:1px solid #8a1000; color:#ff8080; }
    .alert-info { background:#1a1200; border:1px solid #4a3000; color:#c4982a; }

    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.87); display:flex; align-items:center; justify-content:center; z-index:300; padding:20px; }
    .modal { background:#1a1200; border:2px solid #5a3a00; border-radius:16px; padding:26px; max-width:440px; width:100%; max-height:90vh; overflow-y:auto; }
    .modal-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#d4a82a; margin-bottom:18px; }

    /* Misc */
    .empty { text-align:center; padding:40px; color:#4a3820; font-style:italic; }
    .disclaimer { font-size:11px; color:#3a2a10; background:#120e00; border:1px solid #1e1600; border-radius:8px; padding:10px 14px; margin-top:14px; font-style:italic; }
    .loading { text-align:center; padding:100px 20px; color:#7a5c18; font-style:italic; font-size:18px; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn 0.35s ease; }

    /* Setup screen */
    .setup-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .setup-box { max-width:600px; width:100%; background:linear-gradient(135deg,#1a1200,#201600); border:2px solid #5a3a00; border-radius:20px; padding:32px; }
    .setup-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:#d4a82a; text-align:center; }
    .setup-sub { font-size:14px; color:#9a7a30; text-align:center; font-style:italic; margin-bottom:24px; }
    .setup-steps { display:flex; flex-direction:column; gap:16px; }
    .setup-step { display:flex; gap:14px; align-items:flex-start; font-size:14px; line-height:1.6; color:#c0a870; }
    .step-num { min-width:28px; height:28px; border-radius:50%; background:#3a2200; border:1px solid #8a5a00; display:flex; align-items:center; justify-content:center; font-weight:700; color:#d4a82a; font-family:'Playfair Display',serif; flex-shrink:0; }
    .setup-step code { background:#0a0700; border:1px solid #2a1a00; border-radius:4px; padding:1px 6px; font-size:12px; color:#7dea40; }
    .setup-note { margin-top:20px; padding:12px 16px; background:#0a0700; border:1px solid #2a1a00; border-radius:10px; font-size:12px; color:#7a5c18; font-style:italic; text-align:center; }

    @media(max-width:500px){
      .race-tab{padding:7px 9px;font-size:11px}
      .nav-tab{padding:7px 10px;font-size:11px}
